version: 2

sources:
  - name: sigma_de
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
        description: "Raw transaction fact table"
      - name: dim_merchant
        description: "Merchant dimension table"
      - name: dim_customer
        description: "Customer dimension table"

models:
  - name: stg_transactions
    description: "Staged fact transactions with cleaned and standardised data"
    columns:
      - name: transaction_id
        description: "Unique identifier for each transaction"
        tests:
          - not_null
          - unique
      - name: amount
        description: "Transaction amount in USD"
        tests:
          - not_null
      - name: status
        description: "Status of the transaction"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['COMPLETED', 'FAILED', 'PENDING']
          # DELIBERATE FAILING TEST — catches bad data (CANCELLED, PENDING, etc.)
          # Business rule: only COMPLETED and FAILED should reach final marts.
          # PENDING rows in source = bad data that should be investigated.
          # This test is SUPPOSED to fail — do not fix it.
          - accepted_values:
              name: deliberate_bad_status_check
              arguments:
                values: ['COMPLETED', 'FAILED']
      - name: merchant_id
        description: "Foreign key referencing dim_merchant"
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key referencing dim_customer"
        tests:
          - not_null
      - name: transaction_date
        description: "Date of the transaction"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used for the transaction"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
      - name: loaded_at
        description: "Timestamp when the record was loaded"
        tests:
          - not_null

version: 2

models:
  - name: mart_merchant_performance
    description: "Aggregated merchant KPIs: revenue, failure rate, transaction counts, and unique customers"
    columns:
      - name: merchant_id
        description: "Unique identifier for the merchant"
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: "Name of the merchant"
        tests:
          - not_null
      - name: category
        description: "Merchant category"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Food Delivery"
                  - "E-Commerce"
                  - "Entertainment"
                  - "Travel"
                  - "Grocery"
      - name: city
        description: "City where the merchant is located"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue from COMPLETED transactions"
        tests:
          - not_null
      - name: total_transactions
        description: "Total number of transactions (COMPLETED + FAILED)"
        tests:
          - not_null
      - name: failed_count
        description: "Number of FAILED transactions"
        tests:
          - not_null
      - name: failure_rate_pct
        description: "Failure rate as a percentage (0–100)"
        tests:
          - not_null
      - name: avg_transaction_value
        description: "Average value of COMPLETED transactions"
      - name: unique_customers
        description: "Number of distinct customers who transacted"
        tests:
          - not_null
